<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blank Spreadsheet</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f8f9fb;
    }

    h1 {
      margin-bottom: 16px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 900px;
      background: white;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.06);
    }

    th,
    td {
      border: 1px solid #d1d5db;
      padding: 10px;
      min-width: 120px;
    }

    th {
      background: #eef2f7;
      text-align: left;
    }

    td {
      background: #fff;
    }

    td:focus {
      outline: 2px solid #3b82f6;
      outline-offset: -2px;
    }
  </style>
</head>
<body>
  <h1>Blank Spreadsheet</h1>

  <table id="spreadsheet">
    <thead>
      <tr>
        <th>A</th>
        <th>B</th>
        <th>C</th>
        <th>D</th>
        <th>E</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const rows = 10;
    const cols = 5;
    const tbody = document.querySelector("#spreadsheet tbody");

    for (let r = 0; r < rows; r++) {
      const tr = document.createElement("tr");
      for (let c = 0; c < cols; c++) {
        const td = document.createElement("td");
        td.contentEditable = "true";
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
  </script>
</body>
</html>

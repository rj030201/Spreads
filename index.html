<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spreads - Editable Data Table</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header>
      <div>
        <h1>Spreads</h1>
        <p>An interactive editable data table for your site.</p>
      </div>
      <button id="add-row-btn" class="primary-btn">Add Row</button>
    </header>

    <main>
      <section class="table-container">
        <div class="table-toolbar">
          <div>
            <label for="search-input">Search:</label>
            <input id="search-input" type="search" placeholder="Filter rows..." />
          </div>
          <div class="counter" id="row-count"></div>
        </div>

        <table id="data-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Company</th>
              <th>Role</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
